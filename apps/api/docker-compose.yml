services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: arena
    ports:
      - "5433:5432"
    volumes:
      - arena-postgres-data:/var/lib/postgresql/data

  # Raw TXODDS SSE stream storage for the live worker (src/live/**). Mapped to 27018 —
  # deliberately not 27017 — so it never collides with an unrelated local Mongo instance.
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - arena-mongo-data:/data/db

volumes:
  arena-postgres-data:
  arena-mongo-data:
