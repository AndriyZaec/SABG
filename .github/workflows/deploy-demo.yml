name: Deploy Demo

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Full 40-character commit SHA from the default branch
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: demo-operations
  cancel-in-progress: false

jobs:
  verify:
    name: Verify requested revision
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      REQUESTED_SHA: ${{ inputs.commit_sha }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Validate request
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == "refs/heads/$DEFAULT_BRANCH" ]] || {
            echo "Deploy Demo must be dispatched from $DEFAULT_BRANCH" >&2
            exit 1
          }
          [[ "$REQUESTED_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "commit_sha must be a full lowercase 40-character SHA" >&2
            exit 1
          }

      - name: Check out requested revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify default-branch ancestry
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "+refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          [[ "$(git rev-parse HEAD)" == "$REQUESTED_SHA" ]]
          git merge-base --is-ancestor "$REQUESTED_SHA" "refs/remotes/origin/$DEFAULT_BRANCH" || {
            echo "$REQUESTED_SHA is not reachable from $DEFAULT_BRANCH" >&2
            exit 1
          }

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Test workspace
        run: pnpm test

  publish:
    name: Publish immutable image
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}@${{ steps.push.outputs.digest }}
      revision: ${{ inputs.commit_sha }}
    steps:
      - name: Check out verified revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.commit_sha }}
          persist-credentials: false

      - name: Derive image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner=${GITHUB_REPOSITORY_OWNER,,}
          repository=${GITHUB_REPOSITORY#*/}
          repository=${repository,,}
          echo "name=ghcr.io/$owner/$repository" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ inputs.commit_sha }}
          build-args: VCS_REF=${{ inputs.commit_sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy verified image
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: demo
    permissions:
      contents: read
    env:
      REQUESTED_SHA: ${{ needs.publish.outputs.revision }}
    steps:
      - name: Check out trusted operations scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Deploy to VPS
        shell: bash
        env:
          IMAGE: ${{ needs.publish.outputs.image }}
          DEPLOY_PATH: ${{ vars.DEMO_DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.DEMO_SSH_HOST }}
          SSH_USER: ${{ secrets.DEMO_SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.DEMO_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEMO_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          [[ "$DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]] || {
            echo "DEMO_DEPLOY_PATH must be an absolute path with no whitespace" >&2
            exit 1
          }
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9:._-]+$ ]]
          [[ "$SSH_USER" =~ ^[A-Za-z0-9._-]+$ ]]

          key_file="$RUNNER_TEMP/demo_deploy_key"
          known_hosts_file="$RUNNER_TEMP/demo_known_hosts"
          archive="$RUNNER_TEMP/sabg-deploy-$REQUESTED_SHA.tgz"
          remote_archive="/tmp/sabg-deploy-$REQUESTED_SHA.tgz"
          cleanup() { rm -f "$key_file" "$known_hosts_file" "$archive"; }
          trap cleanup EXIT
          install -m 0600 /dev/null "$key_file"
          install -m 0600 /dev/null "$known_hosts_file"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$key_file"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$known_hosts_file"
          tar -czf "$archive" compose.yml deploy/Caddyfile deploy/postgres-init.sh

          scp -i "$key_file" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=$known_hosts_file" \
            "$archive" "$SSH_USER@$SSH_HOST:$remote_archive"
          ssh -i "$key_file" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=$known_hosts_file" "$SSH_USER@$SSH_HOST" \
            "sh -s -- '$DEPLOY_PATH' '$IMAGE' '$REQUESTED_SHA' '$remote_archive'" \
            < deploy/remote-deploy.sh

      - name: Publish deployment summary
        if: success()
        shell: bash
        run: |
          {
            echo '### Demo deployed'
            echo
            echo "- Revision: \`$REQUESTED_SHA\`"
            echo "- Image: \`${{ needs.publish.outputs.image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
