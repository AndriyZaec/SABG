name: Deploy Event

on:
  push:
    branches:
      - "release/**"

permissions:
  contents: read

concurrency:
  group: event-operations
  cancel-in-progress: false

jobs:
  verify:
    name: Verify requested revision
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16.9-bookworm@sha256:253815cf7579ffa05e1673d92e78d37273e61be0e4414e9a1449337d7925be94
        env:
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena
          POSTGRES_DB: arena
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U arena -d arena"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      REQUESTED_SHA: ${{ github.sha }}
      DATABASE_URL: postgres://arena:arena@localhost:5433/arena
    steps:
      - name: Validate request
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == refs/heads/release/* ]] || {
            echo "Deploy Event only accepts release/* branches" >&2
            exit 1
          }
          [[ "$REQUESTED_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "github.sha must be a full lowercase 40-character SHA" >&2
            exit 1
          }

      - name: Check out requested revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify pushed revision
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$REQUESTED_SHA" ]]

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared contracts
        run: pnpm contracts:build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Migrate integration database
        run: pnpm --filter @arena/api db:migrate

      - name: Test API and auth packages
        run: pnpm --filter @arena/api test && pnpm --filter @arena/auth test

  publish:
    name: Publish immutable image
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}@${{ steps.push.outputs.digest }}
      revision: ${{ github.sha }}
    steps:
      - name: Check out verified revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Derive image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner=${GITHUB_REPOSITORY_OWNER,,}
          repository=${GITHUB_REPOSITORY#*/}
          repository=${repository,,}
          echo "name=ghcr.io/$owner/$repository" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: VCS_REF=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy verified image
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: event
    permissions:
      contents: read
      packages: read
    env:
      REQUESTED_SHA: ${{ needs.publish.outputs.revision }}
    steps:
      - name: Check out trusted operations scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.publish.outputs.revision }}
          persist-credentials: false

      - name: Verify release branch is still current
        shell: bash
        run: |
          set -euo pipefail
          release_branch=${GITHUB_REF#refs/heads/}
          git fetch --no-tags origin "+$GITHUB_REF:refs/remotes/origin/$release_branch"
          [[ "$REQUESTED_SHA" == "$(git rev-parse "refs/remotes/origin/$release_branch")" ]] || {
            echo "$REQUESTED_SHA is no longer the HEAD of $release_branch" >&2
            exit 1
          }

      - name: Deploy to VPS
        shell: bash
        env:
          IMAGE: ${{ needs.publish.outputs.image }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]] || {
            echo "DEPLOY_PATH must be an absolute path with no whitespace" >&2
            exit 1
          }
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9:._-]+$ ]]
          [[ "$SSH_USER" =~ ^[A-Za-z0-9._-]+$ ]]
          [[ "$GHCR_USER" =~ ^[A-Za-z0-9-]+$ ]]

          key_file="$RUNNER_TEMP/demo_deploy_key"
          known_hosts_file="$RUNNER_TEMP/demo_known_hosts"
          archive="$RUNNER_TEMP/sabg-deploy-$REQUESTED_SHA.tgz"
          remote_archive="/tmp/sabg-deploy-$REQUESTED_SHA.tgz"
          remote_docker_config="/tmp/sabg-docker-auth-$REQUESTED_SHA"
          cleanup() {
            ssh -i "$key_file" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
              -o "UserKnownHostsFile=$known_hosts_file" -o ConnectTimeout=10 \
              "$SSH_USER@$SSH_HOST" "rm -rf '$remote_docker_config'" >/dev/null 2>&1 || true
            rm -f "$key_file" "$known_hosts_file" "$archive"
          }
          trap cleanup EXIT
          install -m 0600 /dev/null "$key_file"
          install -m 0600 /dev/null "$known_hosts_file"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$key_file"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$known_hosts_file"
          tar -czf "$archive" compose.yml deploy/Caddyfile deploy/postgres-init.sh deploy/mongo-init.sh deploy/remote-event-control.sh

          release_branch=${GITHUB_REF#refs/heads/}
          git fetch --no-tags origin "+$GITHUB_REF:refs/remotes/origin/$release_branch"
          [[ "$REQUESTED_SHA" == "$(git rev-parse "refs/remotes/origin/$release_branch")" ]] || {
            echo "$REQUESTED_SHA is no longer the HEAD of $release_branch" >&2
            exit 1
          }
          printf '%s' "$GHCR_TOKEN" | ssh -i "$key_file" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o "UserKnownHostsFile=$known_hosts_file" \
            "$SSH_USER@$SSH_HOST" \
            "umask 077; mkdir -p '$remote_docker_config'; DOCKER_CONFIG='$remote_docker_config' docker login ghcr.io --username '$GHCR_USER' --password-stdin"
          scp -i "$key_file" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=$known_hosts_file" \
            "$archive" "$SSH_USER@$SSH_HOST:$remote_archive"
          ssh -i "$key_file" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=$known_hosts_file" "$SSH_USER@$SSH_HOST" \
            "DOCKER_CONFIG='$remote_docker_config' sh -s -- '$DEPLOY_PATH' '$IMAGE' '$REQUESTED_SHA' '$remote_archive'" \
            < deploy/remote-deploy.sh
          ssh -i "$key_file" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=$known_hosts_file" "$SSH_USER@$SSH_HOST" \
            "rm -rf '$remote_docker_config'"

      - name: Publish deployment summary
        if: success()
        shell: bash
        run: |
          {
            echo '### Event deployed'
            echo
            echo "- Revision: \`$REQUESTED_SHA\`"
            echo "- Image: \`${{ needs.publish.outputs.image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
