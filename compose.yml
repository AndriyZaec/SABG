name: sabg-demo

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16.9-bookworm@sha256:253815cf7579ffa05e1673d92e78d37273e61be0e4414e9a1449337d7925be94
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 1g
    logging: *default-logging
    env_file:
      - path: ${SABG_POSTGRES_ENV_FILE:-./deploy/postgres.env}
        format: raw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  db-init:
    image: postgres:16.9-bookworm@sha256:253815cf7579ffa05e1673d92e78d37273e61be0e4414e9a1449337d7925be94
    command: ["/scripts/postgres-init.sh"]
    env_file:
      - path: ${SABG_POSTGRES_ENV_FILE:-./deploy/postgres.env}
        format: raw
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./deploy/postgres-init.sh:/scripts/postgres-init.sh:ro
    networks:
      - backend
    restart: "no"
    mem_limit: 256m
    logging: *default-logging

  migrate:
    image: ${SABG_IMAGE:-sabg:local}
    platform: ${SABG_PLATFORM:-linux/amd64}
    build:
      context: .
      args:
        VCS_REF: ${SABG_VCS_REF:-local}
    command: ["node", "dist/db/migrate.js"]
    env_file:
      - path: ${SABG_MIGRATE_ENV_FILE:-./deploy/migrate.env}
        format: raw
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend
    restart: "no"
    mem_limit: 512m
    logging: *default-logging

  app:
    image: ${SABG_IMAGE:-sabg:local}
    platform: ${SABG_PLATFORM:-linux/amd64}
    build:
      context: .
      args:
        VCS_REF: ${SABG_VCS_REF:-local}
    restart: unless-stopped
    stop_grace_period: 60s
    mem_limit: 1g
    logging: *default-logging
    env_file:
      - path: ${SABG_APP_ENV_FILE:-./deploy/app.env}
        format: raw
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "4000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - reset_audits:/app/audit
    networks:
      - edge
      - backend

  caddy:
    image: caddy:2.10.0-alpine@sha256:ae4458638da8e1a91aafffb231c5f8778e964bca650c8a8cb23a7e8ac557aa3c
    restart: unless-stopped
    stop_grace_period: 15s
    mem_limit: 256m
    logging: *default-logging
    env_file:
      - path: ${SABG_CADDY_ENV_FILE:-./deploy/caddy.env}
        format: raw
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

networks:
  edge:
  backend:
    internal: true

volumes:
  postgres_data:
  reset_audits:
  caddy_data:
  caddy_config:
