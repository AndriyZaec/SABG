[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
arena = "84o7QQ3vkGkm3D6wfaqEHxFN93p3Q2b6SFtfazzxZuxH"

[programs.devnet]
arena = "84o7QQ3vkGkm3D6wfaqEHxFN93p3Q2b6SFtfazzxZuxH"

[registry]
url = "https://api.apr.dev"

[provider]
# Default to localnet so `anchor test` never touches devnet (rate limits).
# Deploy to devnet explicitly: `anchor deploy --provider.cluster devnet`.
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec mocha 'tests/**/*.ts'"
